name: Fuzz

on:
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fuzz:
    name: Short fuzz run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          check-latest: true

      - name: Fuzz adjustSignatureLength (60s)
        run: go test -run=- -fuzz=FuzzAdjustSignatureLength -fuzztime=60s .

      - name: Fuzz normalizeS (60s)
        run: go test -run=- -fuzz=FuzzNormalizeS -fuzztime=60s .
